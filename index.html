i<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<title>Blob Test</title>
</head>
<body>
<p>Blob image upload and view test</p>
<a id="img_link">Image Link</a>
<input type="file" allow="image/*" onchange="display(this, this.files[0])"/>
	<script>
		function display(elt, f) {
			var img=document.createElement("img");
			img.src = URL.createObjectURL(f);
			img.onload = function() {
				URL.revokeObjectURL(this.src);
			};
			elt.parentNode.replaceChild(img, elt);
			var link = document.getElementById("img_link");
			link.href = img.src;
			link.target = "_blank";
		}
	</script>
</body>
</html>
